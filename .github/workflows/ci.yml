name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go-test:
    name: Go test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Run unit tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.out

  frontend-test:
    name: Desktop frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/desktop/go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: apps/desktop/frontend/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Wails CLI
        working-directory: apps/desktop
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Generate Wails bindings
        working-directory: apps/desktop
        run: '"$(go env GOPATH)/bin/wails" generate module'

      - name: Run frontend tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build

  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          args: --config=.golangci.yml
