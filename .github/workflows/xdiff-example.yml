name: xdiff-example

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  compare-cases:
    name: Case: ${{ matrix.case_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - case_name: Non-breaking pass (expected)
            scenario: non-breaking
            expected_exit: "0"
            artifact_name: xdiff-success-result
          - case_name: Breaking-change detection (expected)
            scenario: breaking
            expected_exit: "1"
            artifact_name: xdiff-failure-result
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install xdiff
        run: go install ./cmd/xdiff

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - id: diff
        name: Compare mock API responses
        run: |
          set -euo pipefail
          output_file="xdiff-${{ matrix.scenario }}-result.json"
          exit_code="$(scripts/ci/mock_api_compare.sh "${{ matrix.scenario }}" "$output_file")"

          echo "output_file=$output_file" >> "$GITHUB_OUTPUT"
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          echo "xdiff exit code: $exit_code"

      - name: Validate expected exit code
        run: |
          if [ "${{ steps.diff.outputs.exit_code }}" != "${{ matrix.expected_exit }}" ]; then
            echo "Expected exit code ${{ matrix.expected_exit }} for scenario ${{ matrix.scenario }}."
            exit 1
          fi

      - name: Prepare artifact files
        run: |
          set -euo pipefail
          artifact_dir="artifacts/${{ matrix.scenario }}"
          mkdir -p "$artifact_dir"
          cp "${{ steps.diff.outputs.output_file }}" "$artifact_dir/result.json"
          printf '%s\n' "${{ steps.diff.outputs.exit_code }}" > "$artifact_dir/exit_code.txt"
          printf '%s\n' "${{ matrix.expected_exit }}" > "$artifact_dir/expected_exit.txt"

      - name: Upload case artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.scenario }}

      - name: Add case summary
        run: |
          {
            echo "## xdiff case: ${{ matrix.case_name }}"
            echo
            echo "- expected exit code: \`${{ matrix.expected_exit }}\`"
            echo "- observed exit code: \`${{ steps.diff.outputs.exit_code }}\`"
            echo "- artifact: \`${{ matrix.artifact_name }}\`"
            echo
            echo "<details><summary>JSON output</summary>"
            echo
            echo '```json'
            cat "${{ steps.diff.outputs.output_file }}"
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

  pr-comment:
    name: Consolidated PR comment
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: compare-cases
    steps:
      - name: Download success artifact
        uses: actions/download-artifact@v6
        with:
          name: xdiff-success-result
          path: artifacts/success

      - name: Download failure artifact
        uses: actions/download-artifact@v6
        with:
          name: xdiff-failure-result
          path: artifacts/failure

      - name: Post consolidated comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          scripts/ci/post_xdiff_comment.sh \
            "${{ github.repository }}" \
            "${{ github.event.pull_request.number }}" \
            "artifacts/success" \
            "artifacts/failure"
