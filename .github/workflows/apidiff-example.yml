name: apidiff-example

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  success-case:
    name: Non-breaking pass (expected)
    runs-on: ubuntu-latest
    outputs:
      exit_code: ${{ steps.diff.outputs.exit_code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install apidiff
        run: go install ./cmd/apidiff

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - id: diff
        name: Compare mock API responses (non-breaking)
        run: |
          set -euo pipefail

          mkdir -p old-api new-api
          cat > old-api/user.json <<'JSON'
          {"user":{"name":"Taro","age":"20"}}
          JSON
          cat > new-api/user.json <<'JSON'
          {"user":{"name":"Hanako","age":"20"}}
          JSON

          python3 -m http.server 18081 --bind 127.0.0.1 --directory old-api >/tmp/old-api.log 2>&1 &
          OLD_PID=$!
          python3 -m http.server 18082 --bind 127.0.0.1 --directory new-api >/tmp/new-api.log 2>&1 &
          NEW_PID=$!

          cleanup() {
            kill "$OLD_PID" "$NEW_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          wait_for_server() {
            local url="$1"
            local log_file="$2"
            for _ in $(seq 1 30); do
              if curl -fsS "$url" >/dev/null; then
                return 0
              fi
              sleep 0.2
            done

            echo "Server did not become ready: $url"
            echo "--- $log_file ---"
            cat "$log_file" || true
            return 1
          }

          wait_for_server "http://127.0.0.1:18081/user.json" "/tmp/old-api.log"
          wait_for_server "http://127.0.0.1:18082/user.json" "/tmp/new-api.log"

          set +e
          apidiff \
            url \
            --format json \
            --fail-on breaking \
            http://127.0.0.1:18081/user.json \
            http://127.0.0.1:18082/user.json > apidiff-success-result.json
          EXIT_CODE=$?
          set -e

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "apidiff exit code: $EXIT_CODE"

      - name: Validate expected exit code
        run: |
          if [ "${{ steps.diff.outputs.exit_code }}" != "0" ]; then
            echo "Expected exit code 0 for non-breaking case."
            exit 1
          fi

      - name: Upload success artifact
        uses: actions/upload-artifact@v6
        with:
          name: apidiff-success-result
          path: apidiff-success-result.json

      - name: Add success summary
        run: |
          {
            echo "## apidiff success case"
            echo
            echo "- expected exit code: \`0\`"
            echo "- observed exit code: \`${{ steps.diff.outputs.exit_code }}\`"
            echo "- artifact: \`apidiff-success-result\`"
            echo
            echo "<details><summary>JSON output</summary>"
            echo
            echo '```json'
            cat apidiff-success-result.json
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

  failure-case:
    name: Breaking-change detection (expected)
    runs-on: ubuntu-latest
    outputs:
      exit_code: ${{ steps.diff.outputs.exit_code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install apidiff
        run: go install ./cmd/apidiff

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - id: diff
        name: Compare mock API responses (breaking)
        run: |
          set -euo pipefail

          mkdir -p old-api new-api
          cat > old-api/user.json <<'JSON'
          {"user":{"name":"Taro","age":"20","email":"taro@example.com"}}
          JSON
          cat > new-api/user.json <<'JSON'
          {"user":{"name":"Hanako","age":"20","phone":"090-xxxx-xxxx"}}
          JSON

          python3 -m http.server 18081 --bind 127.0.0.1 --directory old-api >/tmp/old-api.log 2>&1 &
          OLD_PID=$!
          python3 -m http.server 18082 --bind 127.0.0.1 --directory new-api >/tmp/new-api.log 2>&1 &
          NEW_PID=$!

          cleanup() {
            kill "$OLD_PID" "$NEW_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          wait_for_server() {
            local url="$1"
            local log_file="$2"
            for _ in $(seq 1 30); do
              if curl -fsS "$url" >/dev/null; then
                return 0
              fi
              sleep 0.2
            done

            echo "Server did not become ready: $url"
            echo "--- $log_file ---"
            cat "$log_file" || true
            return 1
          }

          wait_for_server "http://127.0.0.1:18081/user.json" "/tmp/old-api.log"
          wait_for_server "http://127.0.0.1:18082/user.json" "/tmp/new-api.log"

          set +e
          apidiff \
            url \
            --format json \
            --fail-on breaking \
            http://127.0.0.1:18081/user.json \
            http://127.0.0.1:18082/user.json > apidiff-failure-result.json
          EXIT_CODE=$?
          set -e

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "apidiff exit code: $EXIT_CODE"

      - name: Validate expected exit code
        run: |
          if [ "${{ steps.diff.outputs.exit_code }}" != "1" ]; then
            echo "Expected exit code 1 for breaking case."
            exit 1
          fi

      - name: Upload failure artifact
        uses: actions/upload-artifact@v6
        with:
          name: apidiff-failure-result
          path: apidiff-failure-result.json

      - name: Add failure summary
        run: |
          {
            echo "## apidiff breaking-change detection case"
            echo
            echo "- expected exit code: \`1\`"
            echo "- observed exit code: \`${{ steps.diff.outputs.exit_code }}\`"
            echo "- artifact: \`apidiff-failure-result\`"
            echo
            echo "<details><summary>JSON output</summary>"
            echo
            echo '```json'
            cat apidiff-failure-result.json
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

  pr-comment:
    name: Consolidated PR comment
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - success-case
      - failure-case
    steps:
      - name: Download success artifact
        uses: actions/download-artifact@v6
        with:
          name: apidiff-success-result
          path: artifacts/success

      - name: Download failure artifact
        uses: actions/download-artifact@v6
        with:
          name: apidiff-failure-result
          path: artifacts/failure

      - name: Post consolidated comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          marker="<!-- apidiff-example-report -->"
          body_file="$(mktemp)"
          payload_file="$(mktemp)"
          comments_json="$(mktemp)"

          success_summary="$(jq '.summary // {}' artifacts/success/apidiff-success-result.json)"
          failure_summary="$(jq '.summary // {}' artifacts/failure/apidiff-failure-result.json)"

          {
            echo "$marker"
            echo "## apidiff example report"
            echo
            echo "| Case | Expected | Observed |"
            echo "| --- | --- | --- |"
            echo "| Non-breaking pass | \`0\` | \`${{ needs.success-case.outputs.exit_code }}\` |"
            echo "| Breaking-change detection | \`1\` | \`${{ needs.failure-case.outputs.exit_code }}\` |"
            echo
            echo "<details><summary>Success case summary</summary>"
            echo
            echo '```json'
            echo "$success_summary"
            echo '```'
            echo "</details>"
            echo
            echo "<details><summary>Failure case summary</summary>"
            echo
            echo '```json'
            echo "$failure_summary"
            echo '```'
            echo "</details>"
          } > "$body_file"

          jq -Rs '{body: .}' < "$body_file" > "$payload_file"
          gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" > "$comments_json"
          comment_id="$(
            jq -r '.[] | select((.body // "") | contains("<!-- apidiff-example-report -->")) | .id' "$comments_json" | head -n 1
          )"

          if [ -n "$comment_id" ]; then
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "repos/${{ github.repository }}/issues/comments/${comment_id}" \
              --input "$payload_file" >/dev/null
          else
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              --input "$payload_file" >/dev/null
          fi
