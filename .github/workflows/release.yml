name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: apps/desktop

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-14
            wails_platform: darwin/arm64
          - platform: darwin-amd64
            runner: macos-13
            wails_platform: darwin/amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/desktop/go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: apps/desktop/frontend/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        working-directory: apps/desktop/frontend
        run: npm ci

      - name: Build
        env:
          # TODO: when an Apple Developer ID is available, set
          #   APPLE_ID, APPLE_ID_PASSWORD, APPLE_TEAM_ID and pass
          #   codesign / notarize flags here.
          GOFLAGS: -trimpath
        run: wails build -clean -platform ${{ matrix.wails_platform }}

      - name: Package macOS artifact
        run: |
          cd build/bin
          zip -r "xdiff-${GITHUB_REF_NAME}-${{ matrix.platform }}.zip" xdiff-desktop.app

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: xdiff-${{ matrix.platform }}
          path: apps/desktop/build/bin/xdiff-*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/xdiff-*.zip
          generate_release_notes: true
          draft: true
